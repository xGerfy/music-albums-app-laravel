version: "3.8"

services:
  nginx:
    image: "nginx:stable-alpine"
    container_name: nutnet-nginx
    volumes:
      - ./../src/:/var/www/laravel
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_PORT}:80"

  php:
    build: ./php
    container_name: nutnet-php
    env_file:
      - .env
    volumes:
      - ./../src/:/var/www/laravel

  pgsql:
    image: postgres:17
    container_name: nutnet-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"

volumes:
  pgdata: